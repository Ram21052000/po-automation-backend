server.port=${PORT:8080}
spring.application.name=po-automation

# Database (Render Postgres friendly)
# IMPORTANT: Do NOT set SPRING_DATASOURCE_URL to a placeholder string.
# On Render, set JDBC_DATABASE_URL / JDBC_DATABASE_USERNAME / JDBC_DATABASE_PASSWORD
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/po_db}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Simple demo credentials for interview prototype
app.auth.username=admin
app.auth.password=admin123

# Public API for rates, with graceful fallback in code
app.currency.rate-url=https://api.exchangerate.host/latest?base=USD&symbols=GBP