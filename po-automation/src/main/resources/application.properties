server.port=${PORT:8080}
spring.application.name=po-automation

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/po_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Simple demo credentials for interview prototype
app.auth.username=admin
app.auth.password=admin123

# Public API for rates, with graceful fallback in code
app.currency.rate-url=https://api.exchangerate.host/latest?base=USD&symbols=GBP